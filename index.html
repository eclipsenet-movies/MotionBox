    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f171e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .hero-gradient {
            background: linear-gradient(to right, #0f171e 25%, rgba(15, 23, 30, 0.4) 60%, transparent 100%);
        }
        .bottom-vignette {
            background: linear-gradient(to top, #0f171e 15%, transparent 100%);
        }

        .top-10-number {
            font-size: 10rem; 
            line-height: 1; 
            font-weight: 900; 
            -webkit-text-stroke: 2px #556677; 
            color: transparent;
            margin-right: -45px; 
            z-index: 10;
            font-family: Arial, sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .sidebar-icon { color: #808080; transition: all 0.3s; cursor: pointer; }
        .sidebar-icon:hover { color: #ffffff; }
        .active-nav { color: #ffffff; border-left: 3px solid #00a8e1; }

        /* Tooltips */
        .nav-item .nav-tooltip {
            position: absolute;
            left: 70px;
            background: #00a8e1;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .nav-item:hover .nav-tooltip { opacity: 1; }

        .fa-instagram:hover { color: #E1306C; }
        .fa-facebook:hover { color: #1877F2; }
        .fa-youtube:hover { color: #FF0000; }
    </style>
</head>
