<style>
    /* Darker Deep Purple Background */
    body { background-color: #0b0214; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Welcome Overlay with Purple Gradient */
    #welcome-overlay {
        position: fixed;
        inset: 0;
        background-color: #0b0214;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s ease-in-out, visibility 0.8s;
    }

    .welcome-text {
        font-size: 2.5rem;
        font-weight: 800;
        text-align: center;
        /* Updated to Purple Gradient */
        background: linear-gradient(to right, #d8b4fe, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards ease-out;
    }

    .loader-line::after {
        content: '';
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #a855f7; /* Purple Loader */
        animation: loading 1.5s infinite;
    }

    /* Side Nav & Hero Gradients */
    .sidebar-icon { color: #a855f7; transition: all 0.3s; cursor: pointer; }
    .active-nav { color: #ffffff; border-left: 3px solid #a855f7; }
    .hero-gradient { background: linear-gradient(to right, #0b0214 25%, rgba(11, 2, 20, 0.4) 60%, transparent 100%); }
    .bottom-vignette { background: linear-gradient(to top, #0b0214 15%, transparent 100%); }
    
    .nav-item .nav-tooltip { background: #a855f7; }
    
    /* Custom Bloodhound Logo Glow */
    .bloodhound-font {
        filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.4));
    }
</style>
