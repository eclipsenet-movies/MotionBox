<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f171e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Welcome Overlay Styles */
        #welcome-overlay {
            position: fixed;
            inset: 0;
            background-color: #0f171e;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .welcome-text {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #00a8e1, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards ease-out;
        }

        .welcome-subtext {
            color: #808080;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0;
            animation: fadeInUp 1s forwards 0.5s ease-out;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .loader-line {
            width: 100px;
            height: 2px;
            background: #1e293b;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .loader-line::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #00a8e1;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            100% { left: 100%; }
        }

        /* Existing Styles */
        .hero-gradient { background: linear-gradient(to right, #0f171e 25%, rgba(15, 23, 30, 0.4) 60%, transparent 100%); }
        .bottom-vignette { background: linear-gradient(to top, #0f171e 15%, transparent 100%); }
        .top-10-number { font-size: 10rem; line-height: 1; font-weight: 900; -webkit-text-stroke: 2px #556677; color: transparent; margin-right: -45px; z-index: 10; font-family: Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-icon { color: #00a8e1; transition: all 0.3s; cursor: pointer; }
        .sidebar-icon:hover { color: #ffffff; transform: translateY(-2px); }
        .active-nav { color: #ffffff; border-left: 3px solid #00a8e1; }
        .nav-item .nav-tooltip { position: absolute; left: 70px; background: #00a8e1; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap; }
        .nav-item:hover .nav-tooltip { opacity: 1; }
        #details-page { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); transform: translateX(100%); }
        #details-page.active { transform: translateX(0); }
        .bloodhound-font { font-family: 'Archivo Black', sans-serif; font-style: italic; background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'), #ffffff; -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); letter-spacing: -0.05em; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="welcome-overlay">
        <h1 class="welcome-text">Hello Raveena,</h1>
        <p class="welcome-subtext">Welcome to Our EC Movie Downloading Web Site</p>
        <div class="loader-line"></div>
    </div>

    <div class="fixed top-0 right-0 z-40 flex items-center space-x-6 px-8 py-6 bg-gradient-to-l from-[#0f171e] to-transparent">
        <div class="flex items-center space-x-5 border-r border-gray-700 pr-6">
            <a href="#" class="sidebar-icon"><i class="fa-brands fa-instagram text-xl"></i></a>
            <a href="#" class="sidebar-icon"><i class="fa-brands fa-facebook text-xl"></i></a>
            <a href="#" class="sidebar-icon"><i class="fa-brands fa-youtube text-xl"></i></a>
        </div>
        <div class="flex items-center space-x-3 cursor-pointer group">
            <span class="text-sm font-bold text-gray-400 group-hover:text-white transition">My Account</span>
            <i class="fa-solid fa-user-circle text-2xl text-blue-400"></i>
        </div>
    </div>

    <nav class="fixed left-0 top-0 h-screen w-20 flex flex-col items-center py-8 bg-[#0f171e] z-50 border-r border-gray-800">
        <div class="text-blue-400 text-2xl font-bold italic tracking-tighter mb-12">EC</div>
        <div class="flex flex-col items-center space-y-10 w-full">
            <div class="nav-item flex flex-col items-center w-full relative">
                <i class="fa-solid fa-house text-[#808080] hover:text-white transition-all active-nav pl-2 text-xl"></i>
                <span class="nav-tooltip">Home</span>
            </div>
            </div>
    </nav>

    <div id="home-content">
        <section class="relative h-[90vh] ml-20 overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img src="https://images.lifestyleasia.com/wp-content/uploads/sites/7/2025/01/16124954/Untitled-design-2025-01-16T124823.913-1600x900.jpg" alt="Hero Background" class="w-full h-full object-cover">
                <div class="hero-gradient absolute inset-0"></div>
                <div class="bottom-vignette absolute inset-0"></div>
            </div>

            <div class="relative z-20 flex flex-col justify-center h-full px-16 max-w-3xl space-y-4">
                <div class="flex items-center space-x-2 text-blue-400 font-bold uppercase text-xs tracking-widest">
                    <i class="fa-solid fa-star"></i> <span>Premium Feature</span>
                </div>
                <div class="py-2">
                    <h1 class="bloodhound-font text-7xl font-black tracking-tighter leading-[0.75] uppercase">
                        Bloodhounds<br><span class="text-5xl tracking-normal">Season 2</span>
                    </h1>
                </div>
                <p class="text-lg text-gray-300 leading-relaxed font-medium">Kim Gun-Woo and Hong Woo-Jin are back...</p>
                <div class="pt-4 flex space-x-4">
                    <button onclick="openDetails()" class="bg-white text-black px-8 py-3 rounded font-bold hover:bg-gray-200 transition">Play Now</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Welcome Overlay Logic
        window.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('welcome-overlay');
            
            // Show the welcome screen for 3 seconds, then fade out
            setTimeout(() => {
                overlay.style.opacity = '0';
                overlay.style.visibility = 'hidden';
                document.body.style.overflow = 'auto'; // Re-enable scrolling
            }, 3000);
        });

        // Existing Details Page Functions
        function openDetails() {
            const detailsPage = document.getElementById('details-page');
            detailsPage.classList.remove('hidden');
            setTimeout(() => detailsPage.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            const detailsPage = document.getElementById('details-page');
            detailsPage.classList.remove('active');
            setTimeout(() => detailsPage.classList.add('hidden'), 500);
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
